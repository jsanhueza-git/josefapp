<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Material de Estudio - 2° Básico</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <!-- Pantalla principal -->
    <div id="home" class="screen active">
        <h1>Material de Estudio - 2° Básico</h1>

        <!-- ASIGNATURAS DINÁMICAS DESDE data.json -->
        <div id="subjects-grid" class="grid"></div>

        <!-- ACCESOS FIJOS (NO DINÁMICOS) -->
        <div class="card subject-Horario" onclick="loadHorario()">
            <div class="icon">🗓️</div>
            <h3>Horario</h3>
        </div>

        <div class="card subject-Calendario" onclick="loadCalendar()">
            <div class="icon">📝</div>
            <h3>Pruebas</h3>
        </div>

    </div>

    <!-- Pantalla de contenido -->
    <div id="content" class="screen">
        <a class="back-btn" onclick="goHome()">← Volver</a>
        <h2 id="subject-title"></h2>
        <div id="subject-body"></div>
    </div>

    <script src="script.js"></script>

</body>
</html>
