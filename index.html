<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Material de Estudio - 2° Básico</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="stylesheet" href="styles.css">

</head>

<body>

    <!-- Pantalla principal -->
    <div id="home" class="screen active">
        <h1>Material de Estudio - 2° Básico</h1>

        <div class="grid">

            <!-- HORARIO 
            <div class="card" onclick="openSubject('Horario de Clases', horarioInteractivoHTML)">
                <div class="icon">🗓️</div>
            </div>-->

            <div class="card" onclick="loadHorario()">
                <div class="icon">🗓️</div>
                <h3>Horario</h3>
            </div>

            <!-- CALENDARIO DE PRUEBAS -->
            <div class="card" onclick="loadCalendar()">
                <div class="icon">📝</div>
                <h3>Pruebas</h3>
            </div>

            <!-- ENGLISH -->
            <div class="card" onclick="loadSubjectData('EnglishLanguage')">
                 <div class="icon">🇬🇧</div>
                 <h3>English Language</h3>
            </div>

            <!-- MATH -->
            <div class="card" onclick="loadSubjectData('Math')">
                <div class="icon">🧮</div>
                <h3>Math</h3>
            </div>

            <!-- OTRAS ASIGNATURAS (vacías por ahora) -->
            <div class="card" onclick="loadSubjectData('NaturalScience')">
                <div class="icon">🔬</div>
                <h3>Natural Science</h3>
            </div>

            <div class="card" onclick="loadSubjectData('SocialStudies')">
                <div class="icon">🌎</div>
                <h3>Social Studies</h3>
            </div>

            <div class="card" onclick="loadSubjectData('Spanish')">
                <div class="icon">🇪🇸</div>
                <h3>Spanish</h3>
            </div>

            <div class="card" onclick="loadSubjectData('Literacy')">
                <div class="icon">📚</div>
                <h3>Literacy</h3>
            </div>

            <div class="card" onclick="loadSubjectData('STEM')">
                <div class="icon">🧪</div>
                <h3>STEM</h3>
            </div>

            <div class="card" onclick="loadSubjectData('Art')">
                <div class="icon">🎨</div>
                <h3>Art</h3>
            </div>

            <div class="card" onclick="loadSubjectData('Music')">
                <div class="icon">🎵</div>
                <h3>Music</h3>
            </div>

            <div class="card" onclick="loadSubjectData('Drama')">
                <div class="icon">🎭</div>
                <h3>Drama</h3>
            </div>

            <div class="card" onclick="loadSubjectData('PhysicalEducation')">
                <div class="icon">🏃</div>
                <h3>Physical Education</h3>
            </div>

            <div class="card" onclick="loadSubjectData('FormacionCiudadana')">
                <div class="icon">🤝</div>
                <h3>Formacion Ciudadana</h3>
            </div>

            <div class="card" onclick="loadSubjectData('FormacionIntegral')">
                <div class="icon">💛</div>
                <h3>Formacion Integral</h3>
            </div>

            <div class="card" onclick="loadSubjectData('CommunicativeSkills')">
                <div class="icon">🗣️</div>
                <h3>Comm. Skills</h3>
            </div>

        </div>
    </div>

    <!-- Pantalla de contenido -->
    <div id="content" class="screen">
        <a class="back-btn" onclick="goHome()">← Volver</a>
        <h2 id="subject-title"></h2>
        <div id="subject-body"></div>
    </div>

    <script src="script.js">
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('service-worker.js');
        }
    </script>

</body>
</html>
