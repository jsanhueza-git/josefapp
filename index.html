<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Material de Estudio - 2° Básico</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <link rel="apple-touch-icon" href="icon.png">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f2f4f7;
            padding-top: env(safe-area-inset-top);
        }

        /* Pantallas */
        .screen {
            display: none;
            width: 100%;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .active {
            display: block;
        }

        /* Pantalla principal */
        #home {
            padding: 20px;
        }

        h1 {
            text-align: center;
            color: #2a4d69;
            margin-bottom: 20px;
            font-size: 24px;
        }

        /* GRID DE TARJETAS */
        .grid {
            display: grid;
            gap: 15px;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
        }

        .card {
            background: white;
            padding: 20px 10px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 3px 6px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: transform 0.15s;
        }

        .card:hover {
            transform: scale(1.03);
        }

        .icon {
            font-size: 40px;
            margin-bottom: 10px;
        }

        /* Pantalla de contenido */
        #content {
            padding: 20px;
        }

        #content h2 {
            text-align: center;
            color: #2a4d69;
        }

        .back-btn {
            background: #4b86b4;
            color: white;
            padding: 12px 20px;
            border-radius: 10px;
            text-decoration: none;
            display: inline-block;
            margin-bottom: 20px;
            font-weight: bold;
        }

        iframe {
            width: 100%;
            max-width: 100%;
            border-radius: 10px;
            margin: 15px 0;
        }
    </style>

    <script>
        function openSubject(title, contentHTML) {
            document.getElementById("home").classList.remove("active");
            document.getElementById("content").classList.add("active");

            document.getElementById("subject-title").innerText = title;
            document.getElementById("subject-body").innerHTML = contentHTML;

            window.scrollTo(0, 0);
        }

        function goHome() {
            document.getElementById("content").classList.remove("active");
            document.getElementById("home").classList.add("active");

            window.scrollTo(0, 0);
        }
    </script>
</head>

<body>

<!-- Pantalla principal -->
<div id="home" class="screen active">
    <h1>Material de Estudio - 2° Básico</h1>

    <div class="grid">

        <!-- ENGLISH -->
        <div class="card" onclick="openSubject('English Language',`
            <h3>Videos</h3>

            <iframe height='315'
                src='https://www.youtube.com/embed/DEO7Z4thvuM'
                frameborder='0' allowfullscreen>
            </iframe>

            <iframe height='315'
                src='https://www.youtube.com/embed/g7kK989HiRQ'
                frameborder='0' allowfullscreen>
            </iframe>

            <h3>Juegos</h3>

            <iframe style="max-width:100%" 
                src="https://wordwall.net/embed/8f310edbc7d3457585ff4d2ddad1aa3c?themeId=21&templateId=69&fontStackId=0" 
                width="500" 
                height="380" 
                frameborder="0" 
                allowfullscreen>
            </iframe>

            <iframe height='380'
                src='https://wordwall.net/embed/16338408?themeId=21&templateId=69&fontStackId=0'
                frameborder='0' allowfullscreen>
            </iframe>

            <iframe height='380'
                src='https://wordwall.net/embed/13739396?themeId=21&templateId=69&fontStackId=0'
                frameborder='0' allowfullscreen>
            </iframe>

            <iframe height='380'
                src='https://wordwall.net/embed/70785962?themeId=21&templateId=69&fontStackId=0'
                frameborder='0' allowfullscreen>
            </iframe>

            <iframe height='380'
                src='https://wordwall.net/embed/74808243?themeId=21&templateId=69&fontStackId=0'
                frameborder='0' allowfullscreen>
            </iframe>
        `)">
            <div class="icon">🇬🇧</div>
            <h3>English</h3>
        </div>

        <!-- MATH -->
        <div class="card" onclick="openSubject('Math',`
            <h3>Juegos</h3>

            <iframe height='380'
                src='https://wordwall.net/embed/12530452?themeId=21&templateId=69&fontStackId=0'
                frameborder='0' allowfullscreen>
            </iframe>
        `)">
            <div class="icon">🔢</div>
            <h3>Math</h3>
        </div>

        <!-- OTRAS ASIGNATURAS (vacías por ahora) -->
        <div class="card" onclick="openSubject('Natural Science',``)">
            <div class="icon">🌱</div>
            <h3>Science</h3>
        </div>

        <div class="card" onclick="openSubject('Social Studies',``)">
            <div class="icon">🌍</div>
            <h3>Social Studies</h3>
        </div>

        <div class="card" onclick="openSubject('Spanish',``)">
            <div class="icon">📘</div>
            <h3>Spanish</h3>
        </div>

        <div class="card" onclick="openSubject('Literacy',``)">
            <div class="icon">📚</div>
            <h3>Literacy</h3>
        </div>

        <div class="card" onclick="openSubject('STEM',``)">
            <div class="icon">🧪</div>
            <h3>STEM</h3>
        </div>

        <div class="card" onclick="openSubject('Art',``)">
            <div class="icon">🎨</div>
            <h3>Art</h3>
        </div>

        <div class="card" onclick="openSubject('Music',``)">
            <div class="icon">🎵</div>
            <h3>Music</h3>
        </div>

        <div class="card" onclick="openSubject('Drama',``)">
            <div class="icon">🎭</div>
            <h3>Drama</h3>
        </div>

        <div class="card" onclick="openSubject('Educación Física',``)">
            <div class="icon">🏃‍♂️</div>
            <h3>Ed. Física</h3>
        </div>

        <div class="card" onclick="openSubject('Formación Ciudadana',``)">
            <div class="icon">🤝</div>
            <h3>Ciudadana</h3>
        </div>

        <div class="card" onclick="openSubject('Formación Integral',``)">
            <div class="icon">💛</div>
            <h3>Integral</h3>
        </div>

        <div class="card" onclick="openSubject('Communicative Skills',``)">
            <div class="icon">🗣️</div>
            <h3>Comms</h3>
        </div>

    </div>
</div>

<!-- Pantalla de contenido -->
<div id="content" class="screen">
    <a class="back-btn" onclick="goHome()">← Volver</a>
    <h2 id="subject-title"></h2>
    <div id="subject-body"></div>
</div>

<script>
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('service-worker.js');
    }
</script>

</body>
</html>
