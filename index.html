<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2°A – App Escolar</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="manifest" href="manifest.webmanifest">
</head>

<body>

    <!-- Pantalla principal -->
    <div id="home" class="home-container">
        <h1>2°A – Asignaturas</h1>

        <div class="subjects-grid">
            <button class="schedule-btn" onclick="loadSchedule()">📅 Ver Horario</button>
            <button class="schedule-btn" onclick="loadSubject('CALENDARIO')">🗓️ Calendario de Pruebas</button>
            <button class="subject-btn" onclick="loadSubject('SPANISH')">📘 Spanish</button>
            <button class="subject-btn" onclick="loadSubject('MATH')">🔢 Math</button>
            <button class="subject-btn" onclick="loadSubject('ENG. LANGUAGE')">🇬🇧 English</button>
            <button class="subject-btn" onclick="loadSubject('LITERACY')">📗 Literacy</button>
            <button class="subject-btn" onclick="loadSubject('NATURAL SCIENCE')">🌿 Natural Science</button>
            <button class="subject-btn" onclick="loadSubject('SOCIAL STUDIES')">🟡 Social Studies</button>
            <button class="subject-btn" onclick="loadSubject('COM. SKILLS')">👥 Communicative Skills</button>
            <button class="subject-btn" onclick="loadSubject('ART')">🎨 Art</button>
            <button class="subject-btn" onclick="loadSubject('MUSIC')">🎵 Music</button>
            <button class="subject-btn" onclick="loadSubject('PHYSICAL ED.')">🏃‍♂️ Physical Ed.</button>
            <button class="subject-btn" onclick="loadSubject('DRAMA')">🎭 Drama</button>
            <button class="subject-btn" onclick="loadSubject('F. INTEGRAL')">💛 Formación Integral</button>
            <button class="subject-btn" onclick="loadSubject('F. CIUDADANA')">🤝 Formación Ciudadana</button>
            <button class="subject-btn" onclick="loadSubject('STEM')">✏️ STEM</button>
        </div>

        <button class="schedule-btn" onclick="loadSchedule()">📅 Ver Horario</button>
    </div>

    <!-- Contenido dinámico -->
    <div id="content" class="content"></div>

    <button id="backBtn" class="back-btn" onclick="goHome()">← Volver</button>

    <script src="script.js">


        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('service-worker.js')
                    .catch(err => console.log('SW error', err));
            });
        }

    </script>
</body>
</html>
