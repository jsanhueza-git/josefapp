<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Material de Estudio - 2° Básico</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <link rel="apple-touch-icon" href="icon.png">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f2f4f7;
            padding-top: env(safe-area-inset-top);
        }

        /* Pantallas */
        .screen {
            display: none;
            width: 100%;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .active {
            display: block;
        }

        /* Pantalla principal */
        #home {
            padding: 20px;
        }

        h1 {
            text-align: center;
            color: #2a4d69;
            margin-bottom: 20px;
            font-size: 24px;
        }

        /* GRID DE TARJETAS */
        .grid {
            display: grid;
            gap: 15px;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
        }

        .card {
            background: white;
            padding: 20px 10px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 3px 6px rgba(0, 0, 0, 0.1);
            cursor: pointer;
            transition: transform 0.15s;
        }

        .card:hover {
            transform: scale(1.03);
        }

        .icon {
            font-size: 40px;
            margin-bottom: 10px;
        }

        /* Pantalla de contenido */
        #content {
            padding: 20px;
        }

        #content h2 {
            text-align: center;
            color: #2a4d69;
        }

        .back-btn {
            background: #4b86b4;
            color: white;
            padding: 12px 20px;
            border-radius: 10px;
            text-decoration: none;
            display: inline-block;
            margin-bottom: 20px;
            font-weight: bold;
        }

        iframe {
            width: 100%;
            max-width: 100%;
            border-radius: 10px;
            margin: 15px 0;
        }

        .horario-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #e8f0fe;
            padding: 10px 14px;
            border-radius: 12px;
            margin: 4px;
            font-size: 14px;
            cursor: pointer;
            border: 1px solid #c5d3f6;
            transition: transform 0.1s, background 0.2s;
        }

        .horario-btn:hover {
            background: #d7e3fc;
            transform: scale(1.03);
        }

        .horario-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        .horario-table th {
            background: #4b86b4;
            color: white;
            padding: 8px;
            border-radius: 6px;
        }

        .horario-table td {
            padding: 10px;
            text-align: center;
            vertical-align: middle;
        }
    </style>

    <script>
        function openSubject(title, contentHTML) {
            document.getElementById("home").classList.remove("active");
            document.getElementById("content").classList.add("active");

            document.getElementById("subject-title").innerText = title;
            document.getElementById("subject-body").innerHTML = contentHTML;

            window.scrollTo(0, 0);
        }

        function goHome() {
            document.getElementById("content").classList.remove("active");
            document.getElementById("home").classList.add("active");

            window.scrollTo(0, 0);
        }


        function openFromSchedule(subjectName) {
            const subjects = {
                "MUSIC": "Music",
                "ART": "Art",
                "F. INTEGRAL": "FormacionIntegral",
                "F. CIUDADANA": "FormacionCiudadana",
                "ENG. LANGUAGE": "EnglishLanguage",
                "SPANISH": "Spanish",
                "MATH": "Math",
                "LITERACY": "Literacy",
                "DRAMA": "Drama",
                "PHYSICAL EDUCATION": "PhysicalEducation",
                "SOCIAL STUDIES": "SocialStudies",
                "NATURAL SCIENCE": "NaturalScience",
                "STEM": "STEM",
                "COM. SKILLS": "CommunicativeSkills"
            };

            const target = subjects[subjectName];

            if (!target) return;

            openSubject(target, contenidos[target]);

        }

        const contenidos = {
    Math: `
        <h2>Math</h2>
        <p>Contenido de Matemáticas - PRUEBA.</p>
                <h3>Juegos</h3>

            <iframe style='max-width:100%' 
                src='https://wordwall.net/embed/42a7916e3c0d45d085d929112e8fd79e?themeId=21&templateId=46&fontStackId=0' 
                width='500'
                height='380'
                frameborder='0'
                allowfullscreen>
            </iframe>

    `,
    NaturalScience: `
        <h2>Natural Science</h2>
        <p>Contenido de Ciencias Naturales - PRUEBA.</p>
    `,
    // ... y así con todas
};

            <td><div class='horario-btn' onclick="openFromSchedule('F. INTEGRAL')">💛 F. INTEGRAL</div></td>
            <td><div class='horario-btn' onclick="openFromSchedule('SPANISH')">📘 SPANISH</div></td>

        </tr>

        <!-- RECREO -->
        <tr><td colspan="7" style="background:#eef; padding:8px;">Recreo (11:15 - 11:30)</td></tr>

        </tr>

        <tr><td colspan="7" style="background:#eef; padding:8px;">Almuerzo (12:15 - 13:00)</td></tr>

        <tr>
            <td>6</td><td>13:00 - 13:45</td>

            <td><div class='horario-btn' onclick="openFromSchedule('LITERACY')">📚 LITERACY</div></td>
            <td><div class='horario-btn' onclick="openFromSchedule('SPANISH')">📘 SPANISH</div></td>
            <td><div class='horario-btn' onclick="openFromSchedule('SOCIAL STUDIES')">🌍 SOCIAL STUDIES</div></td>
            <td></td>
        </tr>

        <!-- BLOQUE 7 -->
        <tr>
            <td>7</td><td>13:45 - 14:30</td>
            <td><div class='horario-btn' onclick="openFromSchedule('PHYSICAL EDUCATION')">🏃‍♂️ PHYSICAL ED.</div></td>
            <td><div class='horario-btn' onclick="openFromSchedule('SOCIAL STUDIES')">🌍 SOCIAL STUDIES</div></td>
            <td><div class='horario-btn' onclick="openFromSchedule('SPANISH')">📘 SPANISH</div></td>
            <td><div class='horario-btn' onclick="openFromSchedule('SOCIAL STUDIES')">🌍 SOCIAL STUDIES</div></td>
            <td></td>
        </tr>

        <!-- RECREO -->
        <tr><td colspan="7" style="background:#eef; padding:8px;">Recreo (14:30 - 14:40)</td></tr>

        <!-- BLOQUE 8 -->
        <tr>
            <td>8</td><td>14:40 - 15:25</td>

            <td><div class='horario-btn' onclick="openFromSchedule('STEM')">🧪 STEM</div></td>
            <td></td>
        </tr>

        <!-- BLOQUE 9 -->
        <tr>
            <td>9</td><td>15:25 - 16:10</td>
            <td><div class='horario-btn' onclick="openFromSchedule('NATURAL SCIENCE')">🌱 NATURAL SCIENCE</div></td>
            <td><div class='horario-btn' onclick="openFromSchedule('MATH')">🔢 MATH</div></td>
            <td><div class='horario-btn' onclick="openFromSchedule('PHYSICAL EDUCATION')">🏃‍♂️ PHYSICAL ED.</div></td>
            <td><div class='horario-btn' onclick="openFromSchedule('STEM')">🧪 STEM</div></td>
            <td></td>
        </tr>

    </table>
`;

    </script>
</head>

<body>

        <div class="grid">

            <!-- HORARIO -->

            <div class="card" onclick="openSubject('Horario de Clases', horarioInteractivoHTML)">

    <!-- Pantalla de contenido -->
    <div id="content" class="screen">
        <a class="back-btn" onclick="goHome()">← Volver</a>

    <script>

</html>
