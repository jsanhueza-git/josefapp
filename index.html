<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Material de Estudio - 2° Básico</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <link rel="apple-touch-icon" href="icon.png">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f2f4f7;
            padding-top: env(safe-area-inset-top);
        }

        /* Pantallas */
        .screen {
            display: none;
            width: 100%;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .active {
            display: block;
        }

        /* Pantalla principal */
        #home {
            padding: 20px;
        }

        h1 {
            text-align: center;
            color: #2a4d69;
            margin-bottom: 20px;
            font-size: 24px;
        }

        /* GRID DE TARJETAS */
        .grid {
            display: grid;
            gap: 15px;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
        }

        .card {
            background: white;
            padding: 20px 10px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 3px 6px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: transform 0.15s;
        }

        .card:hover {
            transform: scale(1.03);
        }

        .icon {
            font-size: 40px;
            margin-bottom: 10px;
        }

        /* Pantalla de contenido */
        #content {
            padding: 20px;
        }

        #content h2 {
            text-align: center;
            color: #2a4d69;
        }

        .back-btn {
            background: #4b86b4;
            color: white;
            padding: 12px 20px;
            border-radius: 10px;
            text-decoration: none;
            display: inline-block;
            margin-bottom: 20px;
            font-weight: bold;
        }

        a.link {
            display: block;
            padding: 12px;
            margin: 10px 0;
            background: #d9ecf2;
            border-radius: 8px;
            text-decoration: none;
            color: #03396c;
            font-weight: bold;
        }

        a.link:hover {
            background: #b3cde0;
        }
    </style>

    <script>
        function openSubject(title, linksHTML) {
            document.getElementById("home").classList.remove("active");
            document.getElementById("content").classList.add("active");

            document.getElementById("subject-title").innerText = title;
            document.getElementById("subject-links").innerHTML = linksHTML;

            window.scrollTo(0, 0);
        }

        function goHome() {
            document.getElementById("content").classList.remove("active");
            document.getElementById("home").classList.add("active");

            window.scrollTo(0, 0);
        }
    </script>
</head>

<body>

<!-- Pantalla principal -->
<div id="home" class="screen active">
    <h1>Material de Estudio - 2° Básico</h1>

    <div class="grid">

        <div class="card" onclick="openSubject('English Language',`
            <a class='link' href='http://www.youtube.com/watch?v=DEO7Z4thvuM' target='_blank'>Video: There is / There are</a>
            <a class='link' href='http://www.youtube.com/watch?v=g7kK989HiRQ' target='_blank'>Video: School Supplies</a>
            <a class='link' href='https://wordwall.net/resource/16338408/there-is-there-are' target='_blank'>Juego: There is / There are</a>
            <a class='link' href='https://wordwall.net/resource/13739396/describing-school-supplies' target='_blank'>Juego: School Supplies</a>
            <a class='link' href='https://wordwall.net/resource/70785962/classroom-objects' target='_blank'>Juego: Classroom Objects</a>
            <a class='link' href='https://wordwall.net/es/resource/74808243/esl/in-the-classroom-window-board-chair-bookcase-wall-floor' target='_blank'>Juego: In the Classroom</a>
        `)">
            <div class="icon">🇬🇧</div>
            <h3>English</h3>
        </div>

        <div class="card" onclick="openSubject('Math',`
            <a class='link' href='https://wordwall.net/resource/12530452/numbers-1-100-game' target='_blank'>Juego: Numbers 1–100</a>
        `)">
            <div class="icon">🔢</div>
            <h3>Math</h3>
        </div>

        <div class="card" onclick="openSubject('Natural Science',``)">
            <div class="icon">🌱</div>
            <h3>Science</h3>
        </div>

        <div class="card" onclick="openSubject('Social Studies',``)">
            <div class="icon">🌍</div>
            <h3>Social Studies</h3>
        </div>

        <div class="card" onclick="openSubject('Spanish',``)">
            <div class="icon">📘</div>
            <h3>Spanish</h3>
        </div>

        <div class="card" onclick="openSubject('Literacy',``)">
            <div class="icon">📚</div>
            <h3>Literacy</h3>
        </div>

        <div class="card" onclick="openSubject('STEM',``)">
            <div class="icon">🧪</div>
            <h3>STEM</h3>
        </div>

        <div class="card" onclick="openSubject('Art',``)">
            <div class="icon">🎨</div>
            <h3>Art</h3>
        </div>

        <div class="card" onclick="openSubject('Music',``)">
            <div class="icon">🎵</div>
            <h3>Music</h3>
        </div>

        <div class="card" onclick="openSubject('Drama',``)">
            <div class="icon">🎭</div>
            <h3>Drama</h3>
        </div>

        <div class="card" onclick="openSubject('Educación Física',``)">
            <div class="icon">🏃‍♂️</div>
            <h3>Ed. Física</h3>
        </div>

        <div class="card" onclick="openSubject('Formación Ciudadana',``)">
            <div class="icon">🤝</div>
            <h3>Ciudadana</h3>
        </div>

        <div class="card" onclick="openSubject('Formación Integral',``)">
            <div class="icon">💛</div>
            <h3>Integral</h3>
        </div>

        <div class="card" onclick="openSubject('Communicative Skills',``)">
            <div class="icon">🗣️</div>
            <h3>Comms</h3>
        </div>

    </div>
</div>

<!-- Pantalla de contenido -->
<div id="content" class="screen">
    <a class="back-btn" onclick="goHome()">← Volver</a>
    <h2 id="subject-title"></h2>
    <div id="subject-links"></div>
</div>

<script>
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('service-worker.js');
    }
</script>

</body>
</html>
